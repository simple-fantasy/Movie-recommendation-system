<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>忘记密码 - 电影推荐系统</title>
    <link href="/static/vendor/bootstrap.min.css" rel="stylesheet" />
    <style>
      :root {
        --bg-dark: #0a0e1a;
        --bg-card: rgba(15, 23, 42, 0.95);
        --accent-gold: #f59e0b;
        --accent-gold-hover: #d97706;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border-color: rgba(148, 163, 184, 0.2);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #0a0e1a 0%, #1e293b 50%, #0f172a 100%);
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background:
          radial-gradient(ellipse at 20% 50%, rgba(245, 158, 11, 0.08) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 20%, rgba(245, 158, 11, 0.05) 0%, transparent 40%);
        pointer-events: none;
        z-index: 0;
      }

      .page-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        z-index: 1;
      }

      .card-wrapper {
        max-width: 480px;
        width: 100%;
        background: var(--bg-card);
        border-radius: 24px;
        padding: 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--border-color);
        backdrop-filter: blur(20px);
      }

      .card-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.75rem;
        font-weight: 600;
        color: var(--text-primary);
        text-align: center;
        margin-bottom: 0.25rem;
      }

      .card-subtitle {
        color: var(--text-secondary);
        font-size: 0.875rem;
        text-align: center;
        margin-bottom: 1.75rem;
      }

      /* Step indicator */
      .step-indicator {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 2rem;
      }

      .step-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(148, 163, 184, 0.3);
        transition: all 0.3s ease;
      }

      .step-dot.active {
        background: var(--accent-gold);
        box-shadow: 0 0 8px rgba(245, 158, 11, 0.4);
      }

      .step-dot.done {
        background: #22c55e;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-secondary);
        font-size: 0.875rem;
        font-weight: 500;
      }

      .form-control {
        width: 100%;
        padding: 0.875rem 1rem;
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 0.95rem;
        transition: all 0.3s ease;
      }

      .form-control:focus {
        outline: none;
        border-color: var(--accent-gold);
        background: rgba(30, 41, 59, 0.8);
        box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
      }

      .form-control::placeholder {
        color: rgba(148, 163, 184, 0.5);
      }

      .btn-submit {
        width: 100%;
        padding: 1rem;
        margin-top: 0.5rem;
        background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-hover) 100%);
        border: none;
        border-radius: 12px;
        color: #0a0e1a;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
      }

      .btn-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .message {
        margin-top: 1rem;
        padding: 0.875rem 1rem;
        border-radius: 10px;
        font-size: 0.875rem;
        text-align: center;
        display: none;
      }

      .message.success {
        display: block;
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #4ade80;
      }

      .message.error {
        display: block;
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
      }

      .security-question-box {
        background: rgba(30, 41, 59, 0.4);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 1.25rem;
        color: var(--accent-gold);
        font-size: 0.95rem;
        text-align: center;
      }

      .back-link {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--text-secondary);
        font-size: 0.8rem;
      }

      .back-link a {
        color: var(--accent-gold);
        text-decoration: none;
      }

      .back-link a:hover {
        text-decoration: underline;
      }

      @media (max-width: 576px) {
        .card-wrapper {
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <div class="card-wrapper">
        <h1 class="card-title">忘记密码</h1>
        <p class="card-subtitle" id="stepLabel">第一步：输入用户名</p>

        <div class="step-indicator">
          <div class="step-dot active" id="dot1"></div>
          <div class="step-dot" id="dot2"></div>
        </div>

        <!-- Step 1: Enter username -->
        <div id="step1">
          <div class="form-group">
            <label class="form-label">用户名</label>
            <input type="text" id="usernameInput" class="form-control" placeholder="请输入您的用户名" autocomplete="username" />
          </div>
          <button class="btn-submit" id="btnCheck">下一步</button>
        </div>

        <!-- Step 2: Answer + new password -->
        <div id="step2" style="display: none;">
          <div class="security-question-box" id="questionDisplay"></div>
          <div class="form-group">
            <label class="form-label">密保答案</label>
            <input type="text" id="answerInput" class="form-control" placeholder="请输入您的密保答案" />
          </div>
          <div class="form-group">
            <label class="form-label">新密码</label>
            <input type="password" id="newPasswordInput" class="form-control" placeholder="设置新密码（至少6位）" />
          </div>
          <div class="form-group">
            <label class="form-label">确认新密码</label>
            <input type="password" id="confirmPasswordInput" class="form-control" placeholder="再次输入新密码" />
          </div>
          <button class="btn-submit" id="btnReset">重置密码</button>
          <button class="btn-submit" id="btnBack" style="margin-top:0.5rem; background: rgba(148,163,184,0.2); color: var(--text-primary);">返回上一步</button>
        </div>

        <!-- Success -->
        <div id="successBox" style="display: none; text-align: center;">
          <div style="font-size: 3rem; margin-bottom: 1rem;">&#10003;</div>
          <p style="color: #4ade80; font-size: 1.1rem; margin-bottom: 0.5rem;">密码重置成功</p>
          <p style="color: var(--text-secondary); font-size: 0.875rem;">
            <span id="countdown">3</span> 秒后跳转到登录页面
          </p>
        </div>

        <div id="message" class="message"></div>

        <div class="back-link">
          <a href="/login">← 返回登录</a>
        </div>
      </div>
    </div>

    <script src="/static/vendor/bootstrap.bundle.min.js?v=2"></script>
    <script src="/static/js/api.js?v=2" defer></script>
    <script src="/static/js/page-forgot-password.js?v=1" defer></script>
  </body>
</html>
