<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 - 电影推荐系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-dark: #0a0e1a;
        --bg-card: rgba(15, 23, 42, 0.95);
        --accent-gold: #f59e0b;
        --accent-gold-hover: #d97706;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border-color: rgba(148, 163, 184, 0.2);
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #0a0e1a 0%, #1e293b 50%, #0f172a 100%);
        position: relative;
        overflow-x: hidden;
      }
      
      /* 电影氛围背景 */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: 
          radial-gradient(ellipse at 20% 50%, rgba(245, 158, 11, 0.08) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 20%, rgba(245, 158, 11, 0.05) 0%, transparent 40%),
          url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23f59e0b' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }
      
      .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        z-index: 1;
      }
      
      .login-wrapper {
        display: grid;
        grid-template-columns: 1fr 420px;
        max-width: 1000px;
        width: 100%;
        background: var(--bg-card);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--border-color);
        backdrop-filter: blur(20px);
      }
      
      /* 左侧品牌区 */
      .brand-section {
        padding: 3rem;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: linear-gradient(180deg, rgba(245, 158, 11, 0.1) 0%, transparent 60%);
        border-right: 1px solid var(--border-color);
        position: relative;
      }
      
      .brand-section::before {
        content: '🎬';
        position: absolute;
        top: 2rem;
        right: 2rem;
        font-size: 4rem;
        opacity: 0.1;
      }
      
      .brand-header {
        margin-bottom: 2rem;
      }
      
      .brand-title {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #f8fafc 0%, #f59e0b 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .brand-subtitle {
        color: var(--text-secondary);
        font-size: 1rem;
        line-height: 1.6;
      }
      
      .brand-features {
        margin-top: auto;
      }
      
      .feature-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
        color: var(--text-secondary);
        font-size: 0.9rem;
      }
      
      .feature-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: rgba(245, 158, 11, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
      }
      
      /* 右侧表单区 */
      .form-section {
        padding: 3rem;
        display: flex;
        flex-direction: column;
      }
      
      .form-header {
        text-align: center;
        margin-bottom: 2rem;
      }
      
      .form-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.75rem;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
      }
      
      .form-subtitle {
        color: var(--text-secondary);
        font-size: 0.875rem;
      }
      
      /* 标签切换 */
      .tab-switcher {
        display: flex;
        background: rgba(30, 41, 59, 0.8);
        border-radius: 12px;
        padding: 4px;
        margin-bottom: 1.5rem;
        border: 1px solid var(--border-color);
      }
      
      .tab-btn {
        flex: 1;
        padding: 0.75rem 1rem;
        border: none;
        background: transparent;
        color: var(--text-secondary);
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s ease;
      }
      
      .tab-btn.active {
        background: var(--accent-gold);
        color: #0a0e1a;
      }
      
      .tab-btn:not(.active):hover {
        color: var(--text-primary);
        background: rgba(245, 158, 11, 0.1);
      }
      
      /* 表单样式 */
      .form-group {
        margin-bottom: 1.25rem;
        position: relative;
      }
      
      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-secondary);
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.3s ease;
      }
      
      .form-control {
        width: 100%;
        padding: 0.875rem 1rem;
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 0.95rem;
        transition: all 0.3s ease;
      }
      
      .form-control:focus {
        outline: none;
        border-color: var(--accent-gold);
        background: rgba(30, 41, 59, 0.8);
        box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        color: var(--text-primary);
      }

      /* 确保输入时文字始终可见 */
      .form-control:not(:placeholder-shown) {
        color: var(--text-primary);
      }
      
      .form-control::placeholder {
        color: rgba(148, 163, 184, 0.5);
      }
      
      /* 输入框包装器 */
      .input-wrapper {
        position: relative;
      }
      
      .input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-secondary);
        font-size: 1rem;
        pointer-events: none;
        transition: color 0.3s;
      }
      
      .form-control:focus ~ .input-icon,
      .input-wrapper:focus-within .input-icon {
        color: var(--accent-gold);
      }
      
      .form-control.with-icon {
        padding-left: 2.75rem;
      }
      
      /* 密码显示切换按钮 */
      .password-toggle {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        background: transparent;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 1rem;
        padding: 0.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.3s;
      }
      
      .password-toggle:hover {
        color: var(--accent-gold);
      }
      
      .form-control.with-toggle {
        padding-right: 2.75rem;
      }
      
      /* 提交按钮 */
      .btn-submit {
        width: 100%;
        padding: 1rem;
        margin-top: 0.5rem;
        background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-hover) 100%);
        border: none;
        border-radius: 12px;
        color: #0a0e1a;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      
      .btn-submit::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: left 0.5s ease;
      }
      
      .btn-submit:hover::before {
        left: 100%;
      }
      
      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
      }
      
      .btn-submit:active {
        transform: translateY(0);
      }
      
      /* 消息提示 */
      .message {
        margin-top: 1rem;
        padding: 0.875rem 1rem;
        border-radius: 10px;
        font-size: 0.875rem;
        text-align: center;
        opacity: 0;
        transform: translateY(-10px);
        transition: all 0.3s ease;
      }
      
      .message.show {
        opacity: 1;
        transform: translateY(0);
      }
      
      .message.success {
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #4ade80;
      }
      
      .message.error {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
      }
      
      /* 底部提示 */
      .form-footer {
        margin-top: 1.5rem;
        text-align: center;
        color: var(--text-secondary);
        font-size: 0.8rem;
      }
      
      .form-footer a {
        color: var(--accent-gold);
        text-decoration: none;
        transition: color 0.3s ease;
      }
      
      .form-footer a:hover {
        color: var(--accent-gold-hover);
        text-decoration: underline;
      }
      
      /* 响应式 */
      @media (max-width: 768px) {
        .login-wrapper {
          grid-template-columns: 1fr;
          max-width: 420px;
        }
        
        .brand-section {
          display: none;
        }
        
        .form-section {
          padding: 2rem;
        }
      }
      
      /* 加载动画 */
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      .loading {
        animation: pulse 1.5s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-wrapper">
        <!-- 左侧品牌区 -->
        <div class="brand-section">
          <div class="brand-header">
            <h1 class="brand-title">CineMatch</h1>
            <p class="brand-subtitle">智能电影推荐系统<br/>基于协同过滤与深度学习的个性化推荐引擎</p>
          </div>
          
          <div class="brand-features">
            <div class="feature-item">
              <div class="feature-icon">🎯</div>
              <span>精准推荐 - ItemCF + NCF 混合算法</span>
            </div>
            <div class="feature-item">
              <div class="feature-icon">📊</div>
              <span>智能分析 - 用户画像与观影时间线</span>
            </div>
            <div class="feature-item">
              <div class="feature-icon">🎬</div>
              <span>海量影片 - MovieLens 数据集支持</span>
            </div>
            <div class="feature-item">
              <div class="feature-icon">⚡</div>
              <span>实时反馈 - 即时优化推荐结果</span>
            </div>
          </div>
        </div>
        
        <!-- 右侧表单区 -->
        <div class="form-section">
          <div class="form-header">
            <h2 class="form-title">欢迎回来</h2>
            <p class="form-subtitle">登录或注册以获取个性化推荐</p>
          </div>
          
          <!-- 标签切换 -->
          <div class="tab-switcher">
            <button class="tab-btn active" data-tab="login">登录</button>
            <button class="tab-btn" data-tab="register">注册</button>
          </div>
          
          <!-- 登录表单 -->
          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <label class="form-label">用户名</label>
              <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" id="loginUsername" class="form-control with-icon" placeholder="请输入用户名" required />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">密码</label>
              <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="loginPassword" class="form-control with-icon with-toggle" placeholder="请输入密码" required />
                <button type="button" class="password-toggle" data-target="loginPassword" title="显示/隐藏密码">
                  👁️
                </button>
              </div>
            </div>
            <button type="submit" class="btn-submit">登录</button>
          </form>
          
          <!-- 注册表单 -->
          <form id="registerForm" class="auth-form" style="display: none;">
            <div class="form-group">
              <label class="form-label">用户名</label>
              <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" id="registerUsername" class="form-control with-icon" placeholder="创建用户名" required />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">密码</label>
              <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="registerPassword" class="form-control with-icon with-toggle" placeholder="设置密码" required />
                <button type="button" class="password-toggle" data-target="registerPassword" title="显示/隐藏密码">
                  👁️
                </button>
              </div>
            </div>
            <button type="submit" class="btn-submit">创建账户</button>
          </form>
          
          <!-- 消息提示 -->
          <div id="message" class="message"></div>
          
          <div class="form-footer">
            <p>提示：导入 MovieLens 数据后，默认用户 user1-user5 密码为 <strong>password</strong></p>
            <p style="margin-top: 0.5rem;"><a href="/app">返回应用首页 →</a></p>
          </div>
        </div>
      </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js" defer></script>
    <script src="/static/js/common.js" defer></script>
    <script src="/static/js/page-login.js" defer></script>
  </body>
</html>
