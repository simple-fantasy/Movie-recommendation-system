{% extends "base.html" %}
{% block title %}影单 - CineMatch{% endblock %}
{% block extra_css %}
<style>
  .list-card { background:var(--cinema-surface); border:1px solid var(--cinema-border); border-radius:12px; overflow:hidden; transition:all .3s ease; cursor:pointer; }
  .list-card:hover { transform:translateY(-4px); border-color:var(--cinema-accent); box-shadow:0 8px 24px rgba(0,0,0,.3); }
  .list-cover { height:200px; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); position:relative; overflow:hidden; }
  .list-cover img { width:100%; height:100%; object-fit:cover; }
  .public-badge { position:absolute; top:10px; right:10px; background:rgba(10,10,10,.8); padding:.25rem .75rem; border-radius:20px; font-size:.75rem; font-weight:500; color:var(--cinema-accent); border:1px solid var(--cinema-border); }
  .list-content { padding:1.25rem; }
  .list-title { font-size:1.1rem; font-weight:600; margin-bottom:.5rem; color:var(--cinema-text); }
  .list-desc { color:var(--cinema-text-secondary); font-size:.875rem; margin-bottom:1rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .list-meta { display:flex; align-items:center; gap:1.5rem; font-size:.875rem; color:var(--cinema-text-secondary); }
</style>
{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row mb-4 align-items-center">
    <div class="col-md-8"><h1 class="mb-2">影单</h1><p class="text-secondary">发现和分享精彩的电影清单</p></div>
    <div class="col-md-4 text-end"><a href="/movie-lists/create" class="btn btn-cinema">+ 创建影单</a></div>
  </div>
  <div class="row mb-4">
    <div class="col-md-6">
      <div class="cinema-search"><i class="ph ph-magnifying-glass search-icon"></i><input type="text" id="search-input" class="form-control bg-dark text-light border-secondary" placeholder="搜索影单..." /></div>
    </div>
  </div>
  <div id="loading" class="d-flex justify-content-center align-items-center" style="height:200px;">
    <div class="spinner-border" role="status" style="color:var(--cinema-accent)!important;"><span class="visually-hidden">加载中...</span></div>
  </div>
  <div id="lists-content" style="display:none;">
    <div class="row g-4" id="lists-grid"></div>
    <div class="text-center mt-4"><button class="btn btn-cinema-outline" id="load-more-btn">加载更多</button></div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
(function () {
  var currentPage = 1, hasMore = true, searchQuery = '';

  function $loading() { return document.getElementById('loading'); }
  function $content() { return document.getElementById('lists-content'); }
  function $grid()    { return document.getElementById('lists-grid'); }
  function $moreBtn() { return document.getElementById('load-more-btn'); }

  function setLoading(on) {
    var l = $loading();
    var c = $content();
    if (l) l.style.setProperty('display', on ? 'flex' : 'none', 'important');
    if (c) c.style.setProperty('display', on ? 'none' : 'block', 'important');
  }

  async function loadLists(page) {
    if (page === undefined) page = 1;
    try {
      var url = '/api/movie-lists/public?page=' + page;
      if (searchQuery) url += '&search=' + encodeURIComponent(searchQuery);
      var data = await api(url);
      if (data.movie_lists) {
        if (page === 1) {
          var grid = $grid();
          if (grid) grid.innerHTML = '';
        }
        displayLists(data.movie_lists);
        var btn = $moreBtn();
        if (!data.pagination.has_next) {
          if (btn) btn.style.display = 'none';
          hasMore = false;
        } else {
          if (btn) btn.style.display = 'inline-block';
          hasMore = true;
        }
        currentPage = data.pagination.page;
      }
    } catch (e) {
      console.error('加载影单失败:', e);
      showToast('加载影单失败，请稍后重试', 'error');
    } finally {
      setLoading(false);
    }
  }

  function displayLists(lists) {
    var grid = $grid();
    if (!grid) return;
    if (lists.length === 0) {
      grid.innerHTML = '<div class="col-12 text-center text-secondary py-5"><div style="font-size:3rem;">📋</div><h3>暂无影单</h3><p>还没有公开的影单，成为第一个创建者吧！</p></div>';
      return;
    }
    lists.forEach(function (list) {
      var col = document.createElement('div');
      col.className = 'col-md-4';
      col.innerHTML = '<div class="list-card" onclick="location.href=\'/movie-lists/' + list.id + '\'">'
        + '<div class="list-cover">' + (list.cover_image ? '<img src="' + escapeHtml(list.cover_image) + '" alt="' + escapeHtml(list.name) + '">' : '') + (list.is_public ? '<span class="public-badge">公开</span>' : '') + '</div>'
        + '<div class="list-content"><div class="list-title">' + escapeHtml(list.name) + '</div><div class="list-desc">' + escapeHtml(list.description || '暂无描述') + '</div>'
        + '<div class="list-meta"><span><i class="ph ph-film-strip"></i> ' + (list.movie_count || 0) + '部</span><span><i class="ph ph-eye"></i> ' + (list.view_count || 0) + '</span><span><i class="ph ph-heart"></i> ' + (list.like_count || 0) + '</span></div>'
        + '<div class="text-secondary mt-2 mb-0" style="font-size:.875rem;">创建者: ' + escapeHtml(list.username || '') + '</div></div></div>';
      grid.appendChild(col);
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    var searchInput = document.getElementById('search-input');
    if (searchInput) {
      searchInput.addEventListener('input', debounce(function () {
        searchQuery = this.value.trim();
        currentPage = 1;
        setLoading(true);
        loadLists(1);
      }, 400));
    }
    var moreBtn = $moreBtn();
    if (moreBtn) {
      moreBtn.addEventListener('click', function () {
        if (hasMore) loadLists(currentPage + 1);
      });
    }
    loadLists();
  });
})();
</script>
{% endblock %}
