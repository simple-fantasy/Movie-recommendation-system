{% extends "base.html" %}
{% block title %}影单详情 - CineMatch{% endblock %}
{% block extra_css %}
<style>
  .list-hero { position:relative; height:300px; overflow:hidden; border-radius:12px 12px 0 0; }
  .list-hero-bg { position:absolute; inset:0; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); }
  .list-hero-bg img { width:100%; height:100%; object-fit:cover; opacity:.6; }
  .list-hero-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(10,10,10,.9) 0%,rgba(10,10,10,.3) 100%); display:flex; align-items:flex-end; padding:2rem; }
  .movie-row-item { display:flex; gap:1rem; padding:1rem; border-radius:10px; background:var(--cinema-surface); border:1px solid var(--cinema-border); margin-bottom:.75rem; transition:all .2s; }
  .movie-row-item:hover { border-color:var(--cinema-accent); transform:translateX(4px); }
  .movie-row-item img { width:80px; height:120px; object-fit:cover; border-radius:8px; }
</style>
{% endblock %}
{% block content %}
<div id="movie-list-page" class="container py-4" data-list-id="{{ list_id }}">
  <div id="loading" class="d-flex justify-content-center align-items-center" style="height:300px;">
    <div class="spinner-border" role="status" style="color:var(--cinema-accent)!important;"><span class="visually-hidden">加载中...</span></div>
  </div>
  <div id="content" style="display:none;">
    <div class="mb-4" style="background:var(--cinema-surface);border:1px solid var(--cinema-border);border-radius:12px;overflow:hidden;">
      <div class="list-hero">
        <div class="list-hero-bg"><img id="cover-image" src="" alt="" /></div>
        <div class="list-hero-overlay">
          <div>
            <h1 class="fw-bold text-white mb-2" id="list-name" style="text-shadow:0 2px 20px rgba(0,0,0,.6);"></h1>
            <div class="d-flex gap-3 text-white-50">
              <span id="creator"></span>
              <span><i class="ph ph-film-strip"></i> <span id="movie-count"></span>部</span>
              <span><i class="ph ph-eye"></i> <span id="view-count"></span></span>
            </div>
          </div>
        </div>
      </div>
      <div class="p-4">
        <div class="d-flex justify-content-between align-items-start">
          <p id="list-description" class="text-secondary mb-0"></p>
          <div class="d-flex gap-2 align-items-center">
            <button id="like-btn" class="btn btn-cinema-outline btn-sm"><span id="like-icon">🤍</span></button>
            <span id="like-count" class="text-secondary"></span>
            <a href="/movie-lists/{{ list_id }}/edit" id="edit-btn" class="btn btn-cinema-outline btn-sm" style="display:none;"><i class="ph ph-pencil"></i></a>
          </div>
        </div>
      </div>
    </div>
    <div class="row g-4">
      <div class="col-md-8"><h3 class="mb-3">电影列表</h3><div id="movies-container"></div></div>
      <div class="col-md-4">
        <div class="p-3 rounded-3" style="background:var(--cinema-surface);border:1px solid var(--cinema-border);">
          <h5 class="mb-3">评论</h5>
          <div id="comment-form" style="display:none;">
            <textarea id="comment-input" class="form-control bg-dark text-light border-secondary mb-2" rows="3" placeholder="写下你的评论..."></textarea>
            <button id="comment-submit-btn" class="btn btn-cinema btn-sm w-100">发表评论</button>
          </div>
          <div id="comments-container"></div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script src="/static/js/page-movie-list-detail.js?v=2"></script>
{% endblock %}
